services:
  - type: web
    name: breathe-esg-backend
    env: python
    buildCommand: "python -m pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_data"
    startCommand: "gunicorn esg_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
